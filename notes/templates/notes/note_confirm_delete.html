<!DOCTYPE html>
<html>
<body>
    <h1>Are you sure you want to delete "{{ note.title }}"?</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background: red; color: white;">Yes, Delete</button>
        <a href="{% url 'note_list' %}">Cancel</a>
    </form>
</body>
</html>
