<!DOCTYPE html>
<html>
<head>
    <title>New Note</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        form { background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px; max-width: 500px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Create New Note</h1>
    <form method="POST">
        {% csrf_token %} {{ form.as_p }}
        <button type="submit">Save Note</button>
        <a href="{% url 'note_list' %}">Cancel</a>
    </form>
</body>
</html>
