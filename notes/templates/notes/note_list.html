<!DOCTYPE html>
<html>
<head>
    <title>My iNote Sync</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #1c1e21; }
.container { max-width: 800px; margin: 0 auto; padding: 20px; }
.note-card { 
    background: white; 
    border-radius: 8px; 
    padding: 20px; 
    margin-bottom: 15px; 
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    transition: transform 0.2s;
}
.note-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
        h1 { color: #333; }
        
    </style>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center;">
    <h1>My Notes</h1>
    <form method="GET" style="margin-bottom: 20px;">
    <input type="text" name="q" placeholder="Search notes..." value="{{ request.GET.q }}" style="padding: 8px; width: 250px; border-radius: 4px; border: 1px solid #ddd;">
    <button type="submit" style="padding: 8px 15px;">Search</button>
    {% if request.GET.q %}
        <a href="{% url 'note_list' %}">Clear</a>
    {% endif %}
</form>
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit" style="background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">Logout</button>
    </form>
</div>
    <a href="{% url 'note_create' %}" style="background: #28a745; color: white; padding: 10px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 20px;">+ Create New Note</a>
    <hr>
    {% for note in notes %}
        <div class="note-card">
            <h3>{{ note.title }}</h3>
            <p>{{ note.content }}</p>
            <small>Last updated: {{ note.updated_at|date:"M d, Y H:i" }}</small>
            <div style="margin-top: 10px;">
            <a href="{% url 'note_update' note.pk %}" style="color: blue; margin-right: 15px;">Edit</a>
            <a href="{% url 'note_delete' note.pk %}" style="color: red;">Delete</a>
        </div>
        </div>
    {% empty %}
        <p>No notes found. Go to the Admin panel to add some!</p>
    {% endfor %}
</body>
</html>
